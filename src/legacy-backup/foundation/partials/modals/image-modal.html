<!-- ===================================================== -->
<!-- PARTIAL: MODAL / IMAGE -->
<!-- Foundation / partials/modals/image-modal.html -->
<!-- ===================================================== -->

<div
  id="modalImg"
  class="fixed inset-0 z-[60] hidden grid place-items-center bg-black/70 p-4 opacity-0 transition-opacity"
>
  <!-- botão fechar -->
  <button
    type="button"
    id="modalClose"
    class="fixed top-4 right-4 z-[61] text-white text-3xl leading-none px-2"
    aria-label="Fechar"
  >
    ✕
  </button>

  <!-- Viewer wrapper (relative para setas/contador) -->
  <!-- Panel -->
  <div
    id="modalImgPanel"
    class="relative flex items-center justify-center opacity-0 transition-[opacity, transform]"
  >
    <!-- imagem ampliada -->
    <img
      id="modalImgSrc"
      class="max-w-[92vw] max-h-[90dvh] rounded-xl shadow-2xl ring-1 ring-white/20 object-contain"
      alt="Pré-visualização"
      draggable="false"
    />

    <!-- Controls (Echo mode only) -->
    <div
      id="modalViewerControls"
      class="pointer-events-none absolute inset-0 hidden"
      aria-hidden="true"
    >
      <!-- Prev -->
      <button
        id="modalViewerPrev"
        type="button"
        aria-label="Imagem anterior"
        class="pointer-events-auto absolute left-3 top-1/2 -translate-y-1/2 grid h-11 w-11 place-items-center rounded-full bg-black/40 text-white ring-1 ring-white/10 hover:bg-black/60 focus:outline-none focus:ring-2 focus:ring-white/60"
      >
        ‹
      </button>

      <!-- Next -->
      <button
        id="modalViewerNext"
        type="button"
        aria-label="Próxima imagem"
        class="pointer-events-auto absolute right-3 top-1/2 -translate-y-1/2 grid h-11 w-11 place-items-center rounded-full bg-black/40 text-white ring-1 ring-white/10 hover:bg-black/60 focus:outline-none focus:ring-2 focus:ring-white/60"
      >
        ›
      </button>

      <!-- Counter -->
      <div class="pointer-events-none absolute bottom-3 left-1/2 -translate-x-1/2">
        <div
          id="modalViewerCounter"
          class="rounded-full bg-black/45 px-3 py-1 text-xs font-medium text-white ring-1 ring-white/10"
          aria-live="polite"
        >
          1 / 1
        </div>
      </div>
    </div>
  </div>
</div>
