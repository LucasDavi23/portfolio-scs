<!-- -------------------------------------------------- -->
<!-- 📌 Header — Main Navigation -->
<!-- PT: Partial do cabeçalho com navegação principal e menu mobile. -->
<!-- EN: Header partial with main navigation and mobile menu. -->
<!-- -------------------------------------------------- -->

<header class="pattern">
  <!-- Fixed Nav -->
  <nav class="fixed inset-x-0 top-0 z-50 shadow-sm shadow-black/20">
    <div class="relative isolate">
      <!-- -------------------------------------------------- -->
      <!-- Background Layer -->
      <!-- PT: Camada visual com blur e overlay da navegação. -->
      <!-- EN: Navigation background with blur and overlay. -->
      <!-- -------------------------------------------------- -->
      <div
        class="absolute inset-0 -z-10 bg-neutral-900/75 backdrop-blur-md backdrop-saturate-150 supports-[backdrop-filter]:bg-neutral-900/65 border-b border-white/10"
      ></div>

      <div class="mx-auto max-w-screen-xl px-4 sm:px-6 lg:px-8 h-16">
        <div class="flex h-16 items-center justify-between">
          <!-- -------------------------------------------------- -->
          <!-- Logo -->
          <!-- -------------------------------------------------- -->
          <div class="flex-1 md:flex md:items-center md:gap-12">
            <a
              href="#home"
              aria-label="Home"
              class="h-12 w-12 sm:h-14 sm:w-14 rounded-full bg-white shadow-md shadow-black/10 ring-1 ring-white/30 p-[3px] flex items-center justify-center"
            >
              <img
                src="assets/img/icons/Logotipo-SCS.svg"
                alt="SCS Molduras - logo"
                class="h-full w-full object-contain select-none pointer-events-none transform-gpu will-change-transform"
                draggable="false"
              />
            </a>
          </div>

          <!-- -------------------------------------------------- -->
          <!-- Mobile Menu Toggle -->
          <!-- -------------------------------------------------- -->
          <div class="flex lg:hidden px-6">
            <button
              id="mobile-menu-toggle"
              type="button"
              class="-m-2.5 inline-flex items-center justify-center rounded-md p-1.5 text-gray-100"
            >
              <span class="sr-only">Abrir menu</span>
              <svg
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                />
              </svg>
            </button>
          </div>

          <!-- -------------------------------------------------- -->
          <!-- PARTIAL: nav/primary-nav -->
          <!-- PT: Navegação principal (desktop) -->
          <!-- EN: Primary navigation (desktop) -->
          <!-- -------------------------------------------------- -->
          {{> nav/primary-nav }}

          <!-- -------------------------------------------------- -->
          <!-- PARTIAL: nav/mobile-nav -->
          <!-- PT: Navegação mobile (hambúrguer) -->
          <!-- EN: Mobile navigation -->
          <!-- -------------------------------------------------- -->
          {{> nav/mobile-nav }}
        </div>
      </div>
    </div>
  </nav>
</header>
