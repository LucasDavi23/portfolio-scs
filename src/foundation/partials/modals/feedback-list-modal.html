<div
  id="modalFeedback"
  class="fixed inset-0 z-[50] hidden items-center justify-center bg-black/60 p-4 sm:p-6 opacity-0 transition-opacity"
>
  <div
    id="modalFeedbackPanel"
    class="mx-auto w-[96vw] max-w-screen-lg lg:max-w-[1100px] 2xl:max-w-[1400px] bg-white rounded-2xl shadow-2xl ring-1 ring-black/10 max-h-[90vh] flex flex-col overflow-hidden opacity-0 translate-y-2 transition-[opacity,transform]"
  >
    <!-- Cabeçalho -->
    <div class="shrink-0 z-10 bg-white/95 backdrop-blur px-6 py-4 border-b">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <h3 id="modalFeedbackTitulo" class="text-lg sm:text-xl font-semibold truncate">
            Avaliações do site (SCS)
          </h3>
          <p id="modalFeedbackSub" class="text-xs text-gray-500 mt-0.5">Carregando…</p>
        </div>

        <div class="flex items-center gap-2 shrink-0">
          <!-- aparece só se houver link da plataforma -->
          <a
            id="modalFeedbackLink"
            target="_blank"
            class="hidden sm:inline-flex items-center rounded-md border px-3 py-1.5 text-xs hover:bg-gray-50"
          >
            Ver na plataforma
          </a>
          <button
            id="modalFeedbackClose"
            class="p-2 rounded-md hover:bg-gray-100"
            aria-label="Fechar"
          >
            ✕
          </button>
        </div>
      </div>
    </div>

    <!-- Lista (rola dentro do card) -->
    <div class="flex-1 overflow-auto overscroll-contain [-webkit-overflow-scrolling:touch]">
      <ul id="modalFeedbackList" class="px-6 py-4 divide-y divide-gray-100"></ul>
    </div>

    <!-- Rodapé -->
    <div class="flex items-center justify-between gap-2 px-6 py-4 border-t bg-gray-50">
      <span id="modalFeedbackInfo" class="text-[11px] text-gray-500">—</span>
      <button
        id="modalFeedbackLoadMore"
        class="inline-flex rounded-lg border px-3 py-1.5 text-xs hover:bg-gray-100"
      >
        Carregar mais
      </button>
    </div>
  </div>
</div>
