<!-- 📌 Section — Hero -->

<!-- EN: Main hero section with visual impact and brand presentation. -->

<section id="home" class="relative overflow-hidden snap-start scroll-mt-20">
  <!-- Background Image -->
  <img
    src="assets/img/background/fundo-1600.webp"
    srcset="
      assets/img/background/fundo-1280.webp 1280w,
      assets/img/background/fundo-1600.webp 1600w,
      assets/img/background/fundo-1920.webp 1920w
    "
    sizes="100vw"
    alt="Parede com coleção de molduras decorativas"
    class="absolute inset-0 w-full h-full object-cover object-center scale-110 blur-sm opacity-70"
    width="1600"
    height="900"
    decoding="async"
    fetchpriority="high"
  />

  <!-- Overlay (contrast layer) -->
  <div class="absolute inset-0 bg-gradient-to-b from-black/50 via-black/35 to-black/50"></div>

  <!-- Content -->
  <div
    class="relative container mx-auto px-4 py-10 min-h-[64vh] md:min-h-[72vh] flex flex-col items-center justify-center text-center"
  >
    <!-- Text Content -->
    <h1
      class="mt-8 text-white font-semibold tracking-wider text-3xl sm:text-5xl lg:text-6xl drop-shadow"
    >
      SCS Molduras
    </h1>
    <p class="text-white/90 mt-4 max-w-xl mx-auto font-light tracking-wider sm:text-xl">
      Fabricação própria de molduras padrão e sob medida. Qualidade, agilidade e acabamento
      profissional.
    </p>
  </div>
</section>
